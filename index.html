<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posti — chi guida oggi?</title>
  <meta name="description" content="Organizza i passaggi in macchina della tua comitiva: chi guida, chi sale, chi dove si siede." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH -->
  <section id="auth-view" class="auth-view">
    <div class="auth-brand-panel">
      <div class="auth-brand-inner">
        <div class="auth-logo">🚗</div>
        <h1>Posti</h1>
        <p>Chi guida oggi? Chi sale?<br />Prenota il tuo posto in macchina.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-card">
        <h2>Entra in Posti</h2>
        <form id="auth-form" novalidate>
          <label for="display-name" id="name-label" class="hidden">Il tuo nome
            <input type="text" id="display-name" maxlength="40" autocomplete="name" placeholder="Come ti chiamano gli amici" />
          </label>
          <label for="email">Email
            <input type="email" id="email" required autocomplete="email" placeholder="tu@esempio.it" />
          </label>
          <label for="password">Password
            <input type="password" id="password" required minlength="6" autocomplete="current-password" placeholder="Minimo 6 caratteri" />
          </label>
          <div class="auth-actions">
            <button type="submit" id="login-btn" class="btn btn-primary">Accedi</button>
            <button type="button" id="signup-btn" class="btn btn-secondary">Crea account</button>
          </div>
        </form>
        <p id="auth-message" class="auth-message" role="status"></p>
      </div>
    </div>
  </section>

  <!-- APP -->
  <div id="app-shell" class="app-shell hidden">
    <header class="topbar">
      <div class="brand">🚗 Posti</div>
      <div class="topbar-right">
        <span id="user-name" class="user-email"></span>
        <button id="logout-btn" class="btn btn-ghost">Esci</button>
      </div>
    </header>

    <main class="app-view">
      <div class="day-bar">
        <div class="day-tabs">
          <button id="day-today" class="tab active">Oggi</button>
          <button id="day-tomorrow" class="tab">Domani</button>
          <input type="date" id="day-picker" class="day-picker" aria-label="Scegli un giorno" />
        </div>
        <button id="offer-toggle" class="btn btn-primary">🔑 Offri un passaggio</button>
      </div>

      <section id="offer-card" class="add-card hidden">
        <h2>Oggi guidi tu</h2>
        <form id="ride-form">
          <div class="form-row">
            <input type="text" id="ride-origin" maxlength="60" placeholder="Partenza (es. Piazza)" aria-label="Partenza" />
            <input type="text" id="ride-destination" maxlength="60" placeholder="Destinazione *" required aria-label="Destinazione" />
            <input type="time" id="ride-time" aria-label="Orario di partenza" />
          </div>
          <div class="form-row form-row-end">
            <label class="rating-label" for="ride-seats">Posti liberi
              <select id="ride-seats">
                <option value="4" selected>4</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="5">5</option>
                <option value="6">6</option>
              </select>
            </label>
            <input type="text" id="ride-note" maxlength="200" placeholder="Nota (es. passo dal bar)" aria-label="Nota" class="note-input" />
            <button type="submit" class="btn btn-primary">Pubblica passaggio</button>
          </div>
        </form>
      </section>

      <div id="rides-list" class="rides-grid"></div>
      <div id="empty-message" class="empty hidden">
        <div class="empty-icon">🅿️</div>
        <p class="empty-title">Nessuna macchina per questo giorno</p>
        <p class="empty-hint">Hai la macchina? Premi "Offri un passaggio" e gli amici prenotano il posto.</p>
      </div>
    </main>

    <footer class="footer">Posti — chi guida, chi sale, chi dove si siede</footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
